name: CI — Build and push image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and push Docker image to ECR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.set-output.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::061836593621:role/app-rapid-github-deploy
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            061836593621.dkr.ecr.eu-north-1.amazonaws.com/app-rapid:${{ github.sha }}
            061836593621.dkr.ecr.eu-north-1.amazonaws.com/app-rapid:latest
          # Persist the layer cache in the GitHub Actions cache so the next
          # build only redoes layers whose inputs changed (npm ci, vite build
          # and pip install are skipped when their inputs are unchanged).
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image tag output
        id: set-output
        run: echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
